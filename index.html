<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Make U Beauty Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    overflow-x:hidden;
    background:
        radial-gradient(circle at top left,#ffd6e8 0%,transparent 35%),
        radial-gradient(circle at bottom right,#ffb3d9 0%,transparent 35%),
        linear-gradient(135deg,#fff0f7,#ffe4f1);
}

.bg-shape{
    position:absolute;
    border-radius:50%;
    filter:blur(90px);
    opacity:.45;
    z-index:0;
}

.shape1{
    width:320px;
    height:320px;
    background:#ff69b4;
    top:-120px;
    left:-120px;
}

.shape2{
    width:380px;
    height:380px;
    background:#ff1493;
    bottom:-150px;
    right:-150px;
}

.container{
    width:100%;
    max-width:500px;
    position:relative;
    z-index:2;
}

.card{
    background:rgba(255,255,255,.96);
    backdrop-filter:blur(20px);
    border-radius:35px;
    padding:35px;
    box-shadow:
        0 25px 60px rgba(255,105,180,.18),
        0 10px 25px rgba(0,0,0,.05);
}

.profile{
    text-align:center;
    margin-bottom:30px;
}

.logo-wrapper{
    background:#ffffff;
    padding:15px;
    border-radius:24px;
    margin-bottom:20px;
    box-shadow:
        0 15px 40px rgba(255,20,147,.12),
        0 5px 15px rgba(0,0,0,.08);
}

.logo-img{
    width:100%;
    max-width:320px;
    display:block;
    margin:auto;
    border-radius:12px;
}

.brand-name{
    font-size:30px;
    font-weight:700;
    color:#d63384;
    margin-bottom:8px;
}

.brand-tagline{
    color:#666;
    font-size:15px;
    line-height:1.6;
}

.links{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.btn{
    text-decoration:none;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
    padding:18px;
    border-radius:18px;
    color:#fff;
    font-size:16px;
    font-weight:600;
    transition:.3s ease;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.btn:hover{
    transform:translateY(-4px);
}

.btn i{
    font-size:22px;
}

.instagram{
    background:linear-gradient(
        135deg,
        #833AB4,
        #FD1D1D,
        #FCAF45
    );
}

.whatsapp{
    background:linear-gradient(
        135deg,
        #25D366,
        #128C7E
    );
}

.location{
    background:linear-gradient(
        135deg,
        #ff85c2,
        #ff4fa0
    );
}

.review{
    background:linear-gradient(
        135deg,
        #f59e0b,
        #f97316
    );
}

.footer{
    text-align:center;
    margin-top:28px;
    color:#888;
    font-size:13px;
    line-height:1.8;
}

.footer-heart{
    color:#ff4fa0;
}

@media(max-width:480px){

    .card{
        padding:24px;
        border-radius:28px;
    }

    .brand-name{
        font-size:25px;
    }

    .brand-tagline{
        font-size:14px;
    }

    .btn{
        padding:16px;
        font-size:15px;
    }

    .btn i{
        font-size:20px;
    }
}
</style>
</head>
<body>

<div class="bg-shape shape1"></div>
<div class="bg-shape shape2"></div>

<div class="container">

    <div class="card">

        <div class="profile">

            <!-- Put your uploaded logo in the same folder as this HTML file -->
            <!-- Rename the logo file to logo.jpg -->

            <div class="logo-wrapper">
                <img
                    src="logo.jpg"
                    alt="Make U Beauty Hub"
                    class="logo-img">
            </div>

            <div class="brand-name">
                Make U Beauty Hub
            </div>

            <div class="brand-tagline">
                Beauty • Makeup • Bridal Studio • Kondotty
            </div>

        </div>

        <div class="links">

            <a href="https://www.instagram.com/make_u.beautyhub?igsh=MmU3eTN1bnQ4cDB2&utm_source=qr"
               target="_blank"
               class="btn instagram">
                <i class="fa-brands fa-instagram"></i>
                Instagram
            </a>

            <a href="https://wa.me/message/LYEE2MOZNQ6RE1"
               target="_blank"
               class="btn whatsapp">
                <i class="fa-brands fa-whatsapp"></i>
                WhatsApp
            </a>

            <a href="https://maps.app.goo.gl/pCWCgf8P7vmDPnqM6?g_st=ic"
               target="_blank"
               class="btn location">
                <i class="fa-solid fa-location-dot"></i>
                Google Location
            </a>

            <a href="https://g.page/r/CZ25ROz2-I8DECk/review"
               target="_blank"
               class="btn review">
                <i class="fa-solid fa-star"></i>
                Leave a Google Review
            </a>

        </div>

        <div class="footer">
            © 2025 Make U Beauty Hub
            <br>
            <span class="footer-heart">❤</span>
            Follow • Chat • Visit • Review
        </div>

    </div>

</div>

</body>
</html>
